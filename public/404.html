<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/" />
    <title>Bogdan & Corina | Wedding Celebration</title>
    <!--
      GitHub Pages SPA fallback (spa-github-pages technique).
      GitHub Pages serves this file for any unknown path. We rewrite the
      requested path into a query string and redirect to "/", where the
      snippet in index.html restores it for React Router. This makes deep
      links such as /upload (e.g. from a QR code) load correctly.
    -->
    <script type="text/javascript">
      // Apex/custom domain serving from root, so keep zero path segments.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
